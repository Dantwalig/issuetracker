version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sprint_tool_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sprint_user
      POSTGRES_PASSWORD: sprint_pass
      POSTGRES_DB: sprint_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: